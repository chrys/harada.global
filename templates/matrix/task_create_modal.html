<div class="fixed inset-0 bg-black bg-opacity-50 flex items-end sm:items-center justify-center z-50 px-0 sm:px-4"
    onclick="if(event.target === this) this.remove()">
    <div class="bg-white dark:bg-slate-800 rounded-t-2xl sm:rounded-lg shadow-lg p-6 sm:p-8 w-full sm:max-w-md max-h-[90vh] overflow-y-auto pb-safe sm:pb-8 relative">
        
        <!-- Mobile Drag Handle -->
        <div class="w-12 h-1.5 bg-slate-300 dark:bg-slate-600 rounded-full mx-auto mb-6 sm:hidden"></div>

        <div class="flex justify-between items-start mb-6">
            <div>
                <h3 class="text-2xl font-bold">New Task</h3>
                <p class="text-sm text-slate-500">{{ pillar.name }} (Position {{ position }})</p>
            </div>
            <button onclick="this.closest('.fixed').remove()"
                class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 text-2xl leading-none p-2">&times;</button>
        </div>

        <form hx-post="{% url 'task_create' chart.id pillar.id position %}" hx-swap="none"
            hx-on::after-request="if(event.detail.successful) this.closest('.fixed').remove()" class="space-y-6">
            {% csrf_token %}

            <div>
                <label for="title" class="block text-sm font-medium mb-1">Title</label>
                <input type="text" id="title" name="title"
                    class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md dark:bg-slate-700 text-[16px]"
                    placeholder="e.g., 1.1">
            </div>

            <div>
                <label for="description" class="block text-sm font-medium mb-1">Description</label>
                <textarea id="description" name="description" rows="3"
                    class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md dark:bg-slate-700 text-[16px]"></textarea>
            </div>

            <div>
                <label for="frequency" class="block text-sm font-medium mb-1">Frequency</label>
                <select id="frequency" name="frequency"
                    class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md dark:bg-slate-700 text-[16px]">
                    <option value="one_time">One-time</option>
                    <option value="routine">Routine</option>
                </select>
            </div>

            <div>
                <label for="status" class="block text-sm font-medium mb-1">Status</label>
                <select id="status" name="status"
                    class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md dark:bg-slate-700 text-[16px]">
                    <option value="todo">To Do</option>
                    <option value="in_progress">In Progress</option>
                    <option value="done">Done</option>
                </select>
            </div>

            <div class="flex gap-4 pt-4">
                <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-md">
                    Save
                </button>
                <button type="button" onclick="this.closest('.fixed').remove()"
                    class="flex-1 bg-slate-300 dark:bg-slate-600 hover:bg-slate-400 dark:hover:bg-slate-500 text-slate-900 dark:text-white font-bold py-3 rounded-md">
                    Close
                </button>
            </div>
        </form>
    </div>
</div>
