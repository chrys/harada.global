<div class="fixed inset-0 bg-black bg-opacity-50 flex items-end sm:items-center justify-center z-50 px-0 sm:px-4"
    onclick="if(event.target === this) this.remove()">
    <div
        class="bg-white dark:bg-slate-800 rounded-t-2xl sm:rounded-lg shadow-lg p-6 sm:p-8 w-full sm:max-w-2xl max-h-[90vh] overflow-y-auto pb-safe sm:pb-8 relative">
        
        <!-- Mobile Drag Handle -->
        <div class="w-12 h-1.5 bg-slate-300 dark:bg-slate-600 rounded-full mx-auto mb-6 sm:hidden"></div>

        <div class="flex justify-between items-start mb-6">
            <div>
                <h3 class="text-2xl font-bold">{{ task.title }}</h3>
                <p class="text-sm text-slate-500">{{ task.pillar.name }}</p>
            </div>
            <button onclick="this.closest('.fixed').remove()"
                class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 text-2xl leading-none p-2">&times;</button>
        </div>

        <form id="task-form" hx-post="{% url 'task_update' chart.id task.id %}" hx-swap="none"
            class="space-y-6 mb-8"
            hx-on::after-request="if(event.detail.successful) this.closest('.fixed').remove()">
            {% csrf_token %}

            <div>
                <label for="title" class="block text-sm font-medium mb-1">Title</label>
                <input type="text" id="title" name="title" value="{{ task.title }}"
                    class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md dark:bg-slate-700 text-[16px]">
            </div>

            <div>
                <label for="description" class="block text-sm font-medium mb-1">Description</label>
                <textarea id="description" name="description" rows="3"
                    class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md dark:bg-slate-700 text-[16px]">{{ task.description }}</textarea>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="frequency" class="block text-sm font-medium mb-1">Frequency</label>
                    <select id="frequency" name="frequency"
                        class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md dark:bg-slate-700 text-[16px]">
                        <option value="one_time" {% if task.frequency == "one_time" %}selected{% endif %}>One-time</option>
                        <option value="routine" {% if task.frequency == "routine" %}selected{% endif %}>Routine</option>
                    </select>
                </div>

                <div>
                    <label for="status" class="block text-sm font-medium mb-1">Status</label>
                    <select id="status" name="status"
                        class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md dark:bg-slate-700 text-[16px]">
                        <option value="todo" {% if task.status == "todo" %}selected{% endif %}>To Do</option>
                        <option value="in_progress" {% if task.status == "in_progress" %}selected{% endif %}>In Progress
                        </option>
                        <option value="done" {% if task.status == "done" %}selected{% endif %}>Done</option>
                    </select>
                </div>
            </div>
        </form>

        <div class="border-t border-slate-200 dark:border-slate-700 pt-8 mb-8">
            <h4 class="text-lg font-bold mb-4">Comments</h4>

            <!-- Add Comment Form -->
            <form hx-post="{% url 'task_comment_create' chart.id task.id %}" hx-target="#comments-list"
                hx-swap="afterbegin" class="mb-6" id="comment-form">
                {% csrf_token %}
                <textarea id="comment-textarea" name="content" rows="3" placeholder="Add a comment..." required
                    class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md dark:bg-slate-700 mb-2 text-[16px]"></textarea>
                <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-md text-sm">
                    Add Comment
                </button>
            </form>

            <!-- Comments List -->
            <div id="comments-list" class="space-y-4">
                {% for comment in task.comments.all %}
                {% include 'matrix/task_comment.html' with comment=comment %}
                {% empty %}
                <p class="text-slate-500 text-sm italic py-4">No comments yet.</p>
                {% endfor %}
            </div>
        </div>

        <!-- Action Buttons at Bottom -->
        <div class="flex gap-4 pt-6 border-t border-slate-300 dark:border-slate-700">
            <button type="submit" form="task-form" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-md">
                Save
            </button>
            <button type="button" onclick="this.closest('.fixed').remove()"
                class="flex-1 bg-slate-300 dark:bg-slate-600 hover:bg-slate-400 dark:hover:bg-slate-500 text-slate-900 dark:text-white font-bold py-3 rounded-md">
                Close
            </button>
        </div>
    </div>
</div>

<script>
    // Clear comment textarea after successful submission
    document.getElementById('comment-form').addEventListener('htmx:afterSwap', () => {
        document.getElementById('comment-textarea').value = '';
    });
</script>
